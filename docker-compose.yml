
services:
  aspnet:
    build: .
    container_name: mealdeliverysaas
    ports:
      - "8081:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres-dev;Port=5432;Database=mealdeliverysaas;Username=postgres;Password=postgres
    networks:
      - backend

networks:
  backend:
    external: true
    name: backend
  
